# audits/project.toml — LYRA project config for found
# Generated by: npx ts-node audits/lyra.ts init
# Detected directories: src

[project]
name = "found"
description = ""
stack = "Vite"

[preflight]
lint = "npm run lint"
typecheck = "npm run typecheck"
test = "npm run test"
build = "npm run build"
cwd = ""
# Visual-only audits do not require green preflight; use:
#   npx ts-node audits/lyra.ts visual-batch --skip-preflight

# --- Agent paths ---
# Fill in the paths each agent should examine in YOUR repo.
# Use globs. session.py verifies they exist before including them.
# Leave arrays empty to let session.py auto-detect.

[paths.logic]
source = ["src/**"]
config = ["package.json", "tsconfig.json"]

[paths.data]
migrations = []
types = []
validation = []
writers = []

[paths.ux]
ui = ["src/**"]
styles = []
i18n = []

[paths.performance]
queries = []
fetching = []
build_config = ["package.json", "vite.config.ts"]

[paths.security]
auth = []
endpoints = []
env = [".env.example"]

[paths.deploy]
build = ["vite.config.ts"]
ci = []
infra = []
logging = []

[paths.visual]
ui = ["src/**"]
styles = []
config = []

[integrations.linear]
api_key_env = "LINEAR_API_KEY"
team_id_env = "LINEAR_TEAM_ID"
project_id_env = "LINEAR_PROJECT_ID"
label_ids_env = "LINEAR_LABEL_IDS"
